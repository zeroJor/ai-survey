services:
  mysql:
    image: mysql:8.0
    container_name: web_interviewer_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: web_interviewer
      MYSQL_USER: web_interviewer
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - web_interviewer_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uweb_interviewer", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  web_interviewer_mysql_data:
